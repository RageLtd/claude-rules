name: Version Bump & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-bump:
    name: Analyze & Bump Version
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    outputs:
      should_release: ${{ steps.dry-run.outputs.should_release }}
      new_version: ${{ steps.dry-run.outputs.new_version }}
      bump_type: ${{ steps.dry-run.outputs.bump_type }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Version Bump (Dry Run)
        id: dry-run
        run: |
          OUTPUT=$(bun scripts/release.ts --dry-run 2>&1)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Nothing to do"; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            NEW_VERSION=$(echo "$OUTPUT" | grep "Version:" | sed 's/.*→ //')
            BUMP_TYPE=$(echo "$OUTPUT" | grep "Bump type:" | sed 's/.*: //')
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          fi

      - name: Run Version Bump
        if: steps.dry-run.outputs.should_release == 'true'
        run: bun scripts/release.ts

      - name: Push Changes and Tags
        if: steps.dry-run.outputs.should_release == 'true'
        run: git push --follow-tags

      - name: Summary
        if: steps.dry-run.outputs.should_release == 'true'
        run: |
          echo "## Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **New Version:** v${{ steps.dry-run.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Bump Type:** ${{ steps.dry-run.outputs.bump_type }}" >> $GITHUB_STEP_SUMMARY

      - name: No Release Needed
        if: steps.dry-run.outputs.should_release != 'true'
        run: |
          echo "## No Version Bump Needed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No conventional commits found that require a version bump." >> $GITHUB_STEP_SUMMARY

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: needs.version-bump.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Pull latest (including version bump)
        run: git pull origin main

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-bump.outputs.new_version }}
          name: v${{ needs.version-bump.outputs.new_version }}
          generate_release_notes: true

      - name: Notify marketplace
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_PAT }}
          VERSION: ${{ needs.version-bump.outputs.new_version }}
        run: |
          gh api repos/RageLtd/claude-plugins/dispatches \
            -f event_type=plugin-release \
            -f "client_payload[plugin_name]=claude-rules" \
            -f "client_payload[version]=$VERSION"

      - name: Release Summary
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ needs.version-bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
