name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          echo "Checking plugin.json is valid JSON..."
          jq . .claude-plugin/plugin.json > /dev/null

      - name: Validate sync script
        run: |
          echo "Checking sync script syntax..."
          bash -n scripts/sync-rules.sh

      - name: Check rule files exist
        run: |
          COUNT=$(find rules -name '*.md' | wc -l)
          echo "Found $COUNT rule files"
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No rule files found in rules/"
            exit 1
          fi

  version-preview:
    name: Version Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Preview Version Bump
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "Version Bump Preview"
          echo "========================"
          echo ""
          echo "Commits in this PR:"
          git log origin/$BASE_REF..HEAD --oneline
          echo ""

          COMMITS=$(git log origin/$BASE_REF..HEAD --format="%s")

          HAS_BREAKING=false
          HAS_FEAT=false
          HAS_FIX=false

          while IFS= read -r msg; do
            if [[ "$msg" =~ ^[a-z]+!: ]] || [[ "$msg" == *"BREAKING CHANGE"* ]]; then
              HAS_BREAKING=true
            fi
            if [[ "$msg" =~ ^feat(\(.+\))?: ]]; then
              HAS_FEAT=true
            fi
            if [[ "$msg" =~ ^(fix|refactor|test|style|perf|ci|build|revert)(\(.+\))?: ]]; then
              HAS_FIX=true
            fi
          done <<< "$COMMITS"

          if $HAS_BREAKING; then
            BUMP="major"
          elif $HAS_FEAT; then
            BUMP="minor"
          elif $HAS_FIX; then
            BUMP="patch"
          else
            BUMP="none"
          fi

          CURRENT_VERSION=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case $BUMP in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
            *) NEW_VERSION="$CURRENT_VERSION" ;;
          esac

          echo "Bump type: $BUMP"
          echo "Version: $CURRENT_VERSION -> $NEW_VERSION"

          {
            echo "## Version Bump Preview"
            echo ""
            echo "**Commits in this PR:**"
            echo '```'
            git log origin/$BASE_REF..HEAD --oneline
            echo '```'
            echo ""
            echo "| Current | Bump | New |"
            echo "|---------|------|-----|"
            echo "| $CURRENT_VERSION | $BUMP | $NEW_VERSION |"
          } >> $GITHUB_STEP_SUMMARY
